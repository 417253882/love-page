<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>给熊雅妮 ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no">

<style>
body {
  margin:0;
  overflow:hidden;
  font-family:Arial, sans-serif;
  color:white;
  text-align:center;
  background:black;
}

/* 星空背景全屏 */
#stars {
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  z-index:-1;
}

/* 中心内容 */
.center {
  position:absolute;
  top:30%;
  width:100%;
  animation:fadeIn 1s;
}

/* 打字动画 */
@keyframes fadeIn {
  from{opacity:0;} to{opacity:1;}
}

/* 按钮容器 */
#buttons {
  margin-top:20px;
  position:relative; /* 容器相对定位，按钮可用绝对定位随机移动 */
  height:60px; /* 初始高度保证容器占位 */
}

/* 按钮样式 */
button {
  padding:10px 20px;
  margin:0 10px;
  font-size:18px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  transition: all 0.3s;
  position:absolute;
}
button#yes { background-color:#ff4d6d; color:white; }
button#no { background-color:#555; color:white; }
button:hover { transform: scale(1.1); }

/* 轮播图片 */
#slideImg {
  width:320px;
  max-width:85%;
  border-radius:16px;
  box-shadow:0 0 30px rgba(255,100,150,0.8);
  transition: all 1s ease;
}

/* 爱心动画，放最顶层 */
.heart {
  position:fixed;
  bottom:0;
  font-size:24px;
  z-index:9999;
  animation:floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% { transform:translateY(0); opacity:1; }
  100% { transform:translateY(-100vh); opacity:0; }
}

/* 电影级结尾 */
#finalOverlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  z-index:10;
}

.finalFade {
  animation: fadeToBlack 2s forwards;
}

@keyframes fadeToBlack {
  to { opacity:1; }
}

.finalTextBig {
  font-size:42px;
  opacity:0;
  animation: fadeInText 2s forwards;
}

.finalTextSmall {
  font-size:26px;
  margin-top:15px;
  opacity:0;
  animation: fadeInText 2s forwards;
  animation-delay:1s;
}

@keyframes fadeInText {
  to { opacity:1; transform: scale(1.05); }
}
</style>
</head>

<body>
<canvas id="stars"></canvas>
<div id="app"></div>

<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// ===== 星空全屏 =====
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let stars = Array.from({length:200}, ()=>({
  x: Math.random()*window.innerWidth,
  y: Math.random()*window.innerHeight,
  r: Math.random()*2
}));

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();

// ===== 音乐 =====
const audio = document.getElementById("bgm");
function playMusic(){
  audio.play().catch(()=>{
    document.addEventListener("click", ()=>audio.play(), {once:true});
  });
}

const app = document.getElementById("app");

// ===== 打字 =====
function typing(callback){
  const msg = "其实这些话，我想说很久了...";
  const textEl = document.getElementById("text");
  let i=0;
  function t(){
    if(i<msg.length){
      textEl.innerHTML += msg[i++];
      setTimeout(t, 60);
    } else {
      if(callback) callback();
    }
  }
  t();
}

// ===== 首页 + 按钮 =====
function showHome(){
  app.innerHTML = `
    <div class="center">
      <h1 id="text"></h1>
      <div id="buttons" style="display:none;">
        <button id="yes">愿意 ❤️</button>
        <button id="no">再想想 😏</button>
      </div>
    </div>
  `;

  typing(()=>{
    const btnsDiv = document.getElementById("buttons");
    btnsDiv.style.display = "block";

    const yesBtn = document.getElementById("yes");
    const noBtn = document.getElementById("no");

    // 初始按钮紧贴文字下方
    yesBtn.style.position = "relative";
    yesBtn.style.left = "0px";
    yesBtn.style.top = "0px";

    noBtn.style.position = "relative";
    noBtn.style.left = "20px"; // 间隔
    noBtn.style.top = "0px";

    yesBtn.onclick = ()=>{
      playMusic();
      startSlider();
    };

    // 点击“再想想”按钮随机移动全屏范围
    noBtn.onclick = function(){
      const btn = this;
      const maxX = window.innerWidth - btn.offsetWidth;
      const maxY = window.innerHeight - btn.offsetHeight;
      const x = Math.random() * maxX;
      const y = Math.random() * maxY;
      btn.style.position = "fixed";
      btn.style.left = x + "px";
      btn.style.top = y + "px";
    };
  });
}

// ===== 图片数据 =====
const slides = [
  "love1.jpg","love2.jpg","love3.jpg","love4.jpg","love5.jpg",
  "love6.jpg","love7.jpg","love8.jpg","love9.jpg","love10.jpg",
  "love11.jpg","love12.jpg","love13.jpg","love14.jpg","love15.jpg"
];

const texts = [
  "第一次见你 ❤️","那天我有点紧张",
  "你真的很好看","也很温柔",
  "慢慢地","我开始在意你",
  "和你聊天","成了每天的期待",
  "见到你","就会开心",
  "你的一举一动","都让我心动",
  "所以今天","我想认真说一次",
  "我喜欢你 ❤️"," "
];

let index = 0;
let timer = null;

// ===== 图片轮播 =====
function startSlider(){
  index = 0;
  app.innerHTML = `
    <div class="center">
      <img id="slideImg">
      <h2 id="text2"></h2>
    </div>
  `;
  timer = setInterval(nextSlide, 1500);
}

function nextSlide(){
  if(index >= slides.length){
    clearInterval(timer);
    finalScene();
    return;
  }

  const img = document.getElementById("slideImg");
  const text = document.getElementById("text2");

  img.src = slides[index];
  text.innerHTML = texts[index] || "";

  img.style.opacity = 0;
  img.style.transform = "scale(1)";
  requestAnimationFrame(()=>{
    img.style.opacity = 1;
    img.style.transform = "scale(1.1)";
  });

  index++;
}

// ===== 电影级结尾 =====
function finalScene(){
  const img = document.getElementById("slideImg");
  img.style.transition = "2s";
  img.style.filter = "blur(8px) brightness(0.3)";
  img.style.transform = "scale(1.2)";

  setTimeout(()=>{
    const overlay = document.createElement("div");
    overlay.id = "finalOverlay";
    overlay.innerHTML = `
      <h1 class="finalTextBig">熊雅妮 ❤️</h1>
      <h2 class="finalTextSmall">我喜欢你</h2>
      <p id="loveText"></p>
    `;
    document.body.appendChild(overlay);
    setTimeout(()=> overlay.classList.add("finalFade"),100);

    hearts();
    words();
  },2000);
}

// ===== 爱心 =====
function hearts(){
  setInterval(()=>{
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤️";
    h.style.left = Math.random()*100 + "vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  },200);
}

// ===== 情话 =====
const w=[
  "遇见你是我最大的幸运 ❤️",
  "我真的很喜欢你",
  "以后也想一直陪着你",
  "我们一起走下去吧 ❤️"
];
let wi=0;
function words(){
  setInterval(()=>{
    document.getElementById("loveText").innerHTML = w[wi];
    wi = (wi+1)%w.length;
  },2000);
}

// ===== 启动首页 =====
showHome();
</script>
</body>
</html>
