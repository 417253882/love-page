<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>给熊雅妮 ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no">

<style>
body {
  margin:0;
  overflow:hidden;
  font-family:Arial, sans-serif;
  color:white;
  text-align:center;
  background:black;
}

/* 星空背景全屏 */
#stars {
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  z-index:-1;
}

/* 中心内容 */
.center {
  position:absolute;
  top:20%;
  width:100%;
  animation:fadeIn 1s;
}

/* 打字动画 */
@keyframes fadeIn {
  from{opacity:0;} to{opacity:1;}
}

/* 按钮容器 */
#buttons {
  margin-top:20px;
  position:relative; /* 容器相对定位，按钮可用绝对定位随机移动 */
  height:60px; /* 初始高度保证容器占位 */
}

/* 按钮样式 */
button {
  padding:10px 20px;
  margin:0 10px;
  font-size:18px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  transition: all 0.3s;
  position:absolute;
}
button#yes { background-color:#ff4d6d; color:white; }
button#no { background-color:#555; color:white; }
button:hover { transform: scale(1.1); }

/* 轮播图片 */
#slideImg {
  width:320px;
  max-width:85%;
  border-radius:16px;
  box-shadow:0 0 30px rgba(255,100,150,0.8);
  transition: all 1s ease;
}

/* 爱心动画，放最顶层 */
.heart {
  position:fixed;
  bottom:0;
  font-size:24px;
  z-index:9999;
  animation:floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% { transform:translateY(0); opacity:1; }
  100% { transform:translateY(-100vh); opacity:0; }
}

/* 电影级结尾 */
#finalOverlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  z-index:10;
}

.finalFade {
  animation: fadeToBlack 2s forwards;
}

@keyframes fadeToBlack {
  to { opacity:1; }
}

.finalTextBig {
  font-size:42px;
  opacity:0;
  animation: fadeInText 2s forwards;
}

.days {
  font-size:26px;
  margin-top:15px;
  opacity:0;
  transform:scale(0.9);
  animation: fadeInText 2s forwards;
  animation-delay:1s;
}

@keyframes fadeInText {
  to { opacity:1; transform: scale(1.05); }
}
</style>
</head>

<body>
<canvas id="stars"></canvas>
<div id="app"></div>

<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// ===== 星空全屏 =====
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let stars = Array.from({length:200}, ()=>({
  x: Math.random()*window.innerWidth,
  y: Math.random()*window.innerHeight,
  r: Math.random()*2
}));

//==动态流星🌠==
let meteors = [];

function createMeteor(){
  // 从右上角附近随机生成
  let x = Math.random() * window.innerWidth * 0.5 + window.innerWidth * 0.3; // 右半屏
  let y = Math.random() * window.innerHeight * 0.5; // 上半屏

  let speed = 6 + Math.random() * 4; // 流星速度
  let angle = Math.PI * 0.75; // 135度，向左下方（x-方向, y+方向）

  meteors.push({
    x,
    y,
    len: 80 + Math.random() * 50,
    dx: Math.cos(angle) * speed,
    dy: Math.sin(angle) * speed,
    opacity: 1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // ⭐ 星星
  ctx.fillStyle="white";
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  });

  // 🌠 流星
meteors.forEach((m, i)=>{
    ctx.beginPath();
    let gradient = ctx.createLinearGradient(
      m.x, m.y,
      m.x + m.len * (-m.dx/m.dy), // 保持方向比例
      m.y + m.len
    );
    gradient.addColorStop(0, "rgba(255,255,255,"+m.opacity+")");
    gradient.addColorStop(1, "rgba(255,255,255,0)");

    ctx.strokeStyle = gradient;
    ctx.lineWidth = 2;

    ctx.moveTo(m.x, m.y);
    ctx.lineTo(m.x + m.dx * m.len/Math.sqrt(m.dx*m.dx + m.dy*m.dy),
               m.y + m.dy * m.len/Math.sqrt(m.dx*m.dx + m.dy*m.dy));
    ctx.stroke();

    // 移动
    m.x += m.dx;
    m.y += m.dy;

    // 逐渐消失
    m.opacity -= 0.01;

    // 删除屏幕外或消失的流星
    if(m.opacity <= 0 || m.x < 0 || m.y > window.innerHeight){
        meteors.splice(i,1);
    }
});

  requestAnimationFrame(draw);
}

setInterval(()=>{
  if(Math.random() < 0.6){ // 出现概率
    createMeteor();
  }
}, 1500);
draw();

// ===== 音乐 =====
const audio = document.getElementById("bgm");
function playMusic(){
  audio.play().catch(()=>{
    document.addEventListener("click", ()=>audio.play(), {once:true});
  });
}

const app = document.getElementById("app");

// ===== 打字 =====
function typing(callback){
  const msg = "其实这些话，我想说很久了...";
  const textEl = document.getElementById("text");
  let i=0;
  function t(){
    if(i<msg.length){
      textEl.innerHTML += msg[i++];
      setTimeout(t, 60);
    } else {
      if(callback) callback();
    }
  }
  t();
}

// ===== 首页 + 按钮 =====
function showHome(){
  app.innerHTML = `
    <div class="center">
      <h1 id="text"></h1>
      <div id="buttons" style="display:none;">
        <button id="yes">愿意 ❤️</button>
        <button id="no">再想想 😏</button>
      </div>
    </div>
  `;

  typing(()=>{
    const btnsDiv = document.getElementById("buttons");
    btnsDiv.style.display = "block";

    const yesBtn = document.getElementById("yes");
    const noBtn = document.getElementById("no");

    // 初始按钮紧贴文字下方
    yesBtn.style.position = "relative";
    yesBtn.style.left = "0px";
    yesBtn.style.top = "0px";

    noBtn.style.position = "relative";
    noBtn.style.left = "20px"; // 间隔
    noBtn.style.top = "0px";

    yesBtn.onclick = ()=>{
      playMusic();
      startSlider();
    };

    // 点击“再想想”按钮随机移动全屏范围
    noBtn.onclick = function(){
      const btn = this;
      const maxX = window.innerWidth - btn.offsetWidth;
      const maxY = window.innerHeight - btn.offsetHeight;
      const x = Math.random() * maxX;
      const y = Math.random() * maxY;
      btn.style.position = "fixed";
      btn.style.left = x + "px";
      btn.style.top = y + "px";
    };
  });
}

// ===== 图片数据 =====
const slides = [
  "love1.jpg","love2.jpg","love3.jpg","love4.jpg","love5.jpg",
  "love6.jpg","love7.jpg","love8.jpg","love9.jpg","love10.jpg",
  "love11.jpg","love12.jpg","love13.jpg","love14.jpg","love15.jpg"
];

const texts = [
  "第一次见你 ❤️","那天我有点紧张",
  "你真的很好看","也很温柔",
  "慢慢地","我开始在意你",
  "和你聊天","成了每天的期待",
  "见到你","就会开心",
  "你的一举一动","都让我心动",
  "所以今天","我想认真说一次",
  "我喜欢你 ❤️"," "
];

let index = 0;
let timer = null;

// ===== 图片轮播 =====
function startSlider(){
  index = 0;
  app.innerHTML = `
    <div class="center">
      <img id="slideImg">
      <h2 id="text2"></h2>
    </div>
  `;
  timer = setInterval(nextSlide, 1800);
}

function nextSlide(){
  if(index >= slides.length){
    clearInterval(timer);
    finalScene();
    return;
  }

  const img = document.getElementById("slideImg");
  const text = document.getElementById("text2");

  img.src = slides[index];
  text.innerHTML = texts[index] || "";

  img.style.opacity = 0;
  img.style.transform = "scale(1)";
  requestAnimationFrame(()=>{
    img.style.opacity = 1;
    img.style.transform = "scale(1.1)";
  });

  index++;
}

// ===== 电影级结尾 =====
function finalScene(){
  const img = document.getElementById("slideImg");
  img.style.transition = "2s";
  img.style.filter = "blur(8px) brightness(0.3)";
  img.style.transform = "scale(1.2)";

  setTimeout(()=>{
    const overlay = document.createElement("div");
    overlay.id = "finalOverlay";
    overlay.innerHTML = `
      <h1 class="finalTextBig">熊雅妮，我喜欢你❤️</h1>
      <h2 id="days" class="days"></h2>
      <p id="loveText"></p>
    `;
    document.body.appendChild(overlay);
    setTimeout(()=> overlay.classList.add("finalFade"),100);

    hearts();
    showDays();
    words();
  },2000);
}

// ===== 爱心 =====
function hearts(){
  setInterval(()=>{
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤️";
    h.style.left = Math.random()*100 + "vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  },200);
}

// 天数
let start = new Date("2016-12-19");
let mode = "day"; // 当前显示模式

function showDays(){
  updateDays();

  const el = document.getElementById("days");

  // 点击切换模式
  el.onclick = ()=>{
    mode = (mode === "day") ? "full" : "day";
    updateDays();
    burstHearts();
  };
}

function updateDays(){
  let now = new Date();
  let diff = now - start;

  let totalDays = Math.floor(diff / (1000*60*60*24));

  if(mode === "day"){
    document.getElementById("days").innerHTML =
      "我们已经一起走过 " + totalDays + " 天 ❤️";
  } else {
    // ===== 计算 年 + 天 + 小时 =====
    let years = Math.floor(totalDays / 365);
    let days = totalDays % 365;

    let hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));

    document.getElementById("days").innerHTML =
      `我们已经在一起 ${years}年 + ${days}天 + ${hours}小时 ❤️`;
  }
}

function burstHearts(){
  for(let i=0;i<20;i++){
    let h=document.createElement("div");
    h.innerHTML="⭐";
    h.style.position="fixed";
    h.style.left="50%";
    h.style.top="50%";
    h.style.fontSize="20px";
    h.style.zIndex=9999;

    let angle=Math.random()*2*Math.PI;
    let distance=100+Math.random()*200;

    h.animate([
      { transform:"translate(-50%,-50%) scale(1)", opacity:1 },
      { transform:`translate(${Math.cos(angle)*distance}px, ${Math.sin(angle)*distance}px) scale(1.5)`, opacity:0 }
    ],{
      duration:800,
      easing:"ease-out"
    });

    document.body.appendChild(h);
    setTimeout(()=>h.remove(),800);
  }
}

// ===== 情话 =====
const w=[
  "遇见你是我最大的幸运 ❤️",
  "我真的很喜欢你",
  "以后也想一直陪着你",
  "我们一起走下去吧 ❤️"
];
let wi=0;
function words(){
  setInterval(()=>{
    document.getElementById("loveText").innerHTML = w[wi];
    wi = (wi+1)%w.length;
  },2000);
}

// ===== 启动首页 =====
showHome();
</script>
</body>
</html>
